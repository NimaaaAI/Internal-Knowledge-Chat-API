<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  header { background: #1a1a1a; color: white; padding: 16px 32px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .tabs { display: flex; gap: 0; background: #2a2a2a; padding: 0 32px; }
  .tab { padding: 12px 20px; cursor: pointer; color: #aaa; font-size: 0.9rem; border-bottom: 2px solid transparent; }
  .tab.active { color: white; border-bottom-color: white; }
  .page { display: none; padding: 32px; max-width: 860px; margin: 0 auto; }
  .page.active { display: block; }
  h2 { font-size: 1.1rem; margin-bottom: 20px; }
  .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input[type=text], textarea, select {
    width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 0.9rem; font-family: inherit; background: #fafafa;
  }
  textarea { resize: vertical; }
  input[type=file] { font-size: 0.9rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button {
    margin-top: 16px; padding: 9px 20px; background: #1a1a1a; color: white;
    border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
  }
  button:hover { background: #333; }
  button.danger { background: #c0392b; }
  button.danger:hover { background: #a93226; }
  .msg { margin-top: 12px; font-size: 0.85rem; padding: 10px 14px; border-radius: 6px; }
  .msg.ok { background: #eafaf1; color: #1e8449; }
  .msg.err { background: #fdecea; color: #c0392b; }
  /* Documents list */
  .doc-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
  .doc-item:last-child { border-bottom: none; }
  .doc-title { font-weight: 600; margin-bottom: 4px; }
  .doc-meta { font-size: 0.78rem; color: #777; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #eee; font-size: 0.75rem; margin-right: 4px; }
  /* Search */
  .result-item { padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
  .result-item:last-child { border-bottom: none; }
  .result-score { font-size: 0.75rem; color: #888; float: right; }
  .result-text { font-size: 0.88rem; margin-top: 6px; line-height: 1.5; }
  /* Chat */
  #chat-box { min-height: 200px; max-height: 420px; overflow-y: auto; padding: 12px; background: #fafafa; border-radius: 6px; border: 1px solid #eee; margin-bottom: 12px; font-size: 0.88rem; line-height: 1.6; }
  .bubble { padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; }
  .bubble.user { background: #1a1a1a; color: white; align-self: flex-end; }
  .bubble.assistant { background: #eee; }
  .sources-block { margin-top: 10px; font-size: 0.78rem; color: #555; }
  .sources-block details summary { cursor: pointer; font-weight: 600; }
</style>
</head>
<body>

<header><h1>Internal Knowledge Base</h1></header>

<div class="tabs">
  <div class="tab active" onclick="show('upload')">Upload</div>
  <div class="tab" onclick="show('documents')">Documents</div>
  <div class="tab" onclick="show('search')">Search</div>
  <div class="tab" onclick="show('chat')">Chat</div>
</div>

<!-- ── UPLOAD ──────────────────────────────────────────── -->
<div id="page-upload" class="page active">
  <h2>Upload</h2>

  <div class="card">
    <h3 style="margin-bottom:16px;font-size:1rem">Plain Text</h3>
    <label>Text *</label>
    <textarea id="txt-text" rows="5" placeholder="Paste your document text here..."></textarea>
    <label>Title *</label>
    <input id="txt-title" type="text" placeholder="e.g. Q1 Strategy Memo">
    <div class="row">
      <div><label>Author</label><input id="txt-author" type="text"></div>
      <div><label>Doc type</label><input id="txt-doctype" type="text" placeholder="memo / report / article"></div>
    </div>
    <div class="row">
      <div><label>Source</label><input id="txt-source" type="text" placeholder="internal / url / ..."></div>
      <div><label>Extra metadata (JSON)</label><input id="txt-meta" type="text" value="{}"></div>
    </div>
    <button onclick="uploadText()">Upload Text</button>
    <div id="txt-msg"></div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:16px;font-size:1rem">PDF / Text File</h3>
    <label>File * (PDF or .txt)</label>
    <input id="doc-file" type="file" accept=".pdf,.txt">
    <label>Title *</label>
    <input id="doc-title" type="text">
    <div class="row">
      <div><label>Author</label><input id="doc-author" type="text"></div>
      <div><label>Doc type</label><input id="doc-doctype" type="text" placeholder="memo / report / article"></div>
    </div>
    <div class="row">
      <div><label>Source</label><input id="doc-source" type="text"></div>
      <div><label>Extra metadata (JSON)</label><input id="doc-meta" type="text" value="{}"></div>
    </div>
    <button onclick="uploadDoc()">Upload File</button>
    <div id="doc-msg"></div>
  </div>
</div>

<!-- ── DOCUMENTS ───────────────────────────────────────── -->
<div id="page-documents" class="page">
  <h2>Uploaded Documents</h2>
  <div class="card" id="doc-list"><em style="color:#888">Loading...</em></div>
</div>

<!-- ── SEARCH ─────────────────────────────────────────── -->
<div id="page-search" class="page">
  <h2>Search</h2>
  <div class="card">
    <label>Query</label>
    <input id="search-q" type="text" placeholder="e.g. Nordic expansion strategy">
    <div class="row">
      <div><label>Filter: doc type</label><input id="search-doctype" type="text"></div>
      <div><label>Filter: author</label><input id="search-author" type="text"></div>
    </div>
    <button onclick="doSearch()">Search</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- ── CHAT ───────────────────────────────────────────── -->
<div id="page-chat" class="page">
  <h2>Chat with Knowledge Base</h2>
  <div class="card">
    <div class="row">
      <div><label>Filter: doc type (optional)</label><input id="chat-doctype" type="text"></div>
      <div><label>Filter: author (optional)</label><input id="chat-author" type="text"></div>
    </div>
  </div>
  <div class="card" style="padding:12px">
    <div id="chat-box"><em style="color:#aaa">Ask a question about your documents...</em></div>
    <div style="display:flex;gap:8px;margin-top:0">
      <input id="chat-input" type="text" placeholder="Type your question..." style="flex:1" onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()" style="margin-top:0">Send</button>
    </div>
  </div>
</div>

<script>
function show(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  event.target.classList.add('active');
  if (page === 'documents') loadDocuments();
}

function msg(id, text, ok) {
  const el = document.getElementById(id);
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}

// ── Upload text ──
async function uploadText() {
  const body = {
    text: document.getElementById('txt-text').value,
    title: document.getElementById('txt-title').value,
    author: document.getElementById('txt-author').value || null,
    doc_type: document.getElementById('txt-doctype').value || null,
    source: document.getElementById('txt-source').value || null,
    extra_metadata: JSON.parse(document.getElementById('txt-meta').value || '{}'),
  };
  try {
    const r = await fetch('/text', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (r.ok) msg('txt-msg', `✓ Uploaded "${d.title}" — ${d.chunks_created} chunk(s) created`, true);
    else msg('txt-msg', d.detail || 'Upload failed', false);
  } catch(e) { msg('txt-msg', e.message, false); }
}

// ── Upload document ──
async function uploadDoc() {
  const file = document.getElementById('doc-file').files[0];
  if (!file) { msg('doc-msg', 'Please select a file', false); return; }
  const form = new FormData();
  form.append('file', file);
  form.append('title', document.getElementById('doc-title').value);
  form.append('author', document.getElementById('doc-author').value);
  form.append('doc_type', document.getElementById('doc-doctype').value);
  form.append('source', document.getElementById('doc-source').value);
  form.append('extra_metadata', document.getElementById('doc-meta').value || '{}');
  try {
    const r = await fetch('/document', { method: 'POST', body: form });
    const d = await r.json();
    if (r.ok) msg('doc-msg', `✓ Uploaded "${d.title}" — ${d.chunks_created} chunk(s) created`, true);
    else msg('doc-msg', d.detail || 'Upload failed', false);
  } catch(e) { msg('doc-msg', e.message, false); }
}

// ── Documents list ──
async function loadDocuments() {
  const el = document.getElementById('doc-list');
  el.innerHTML = '<em style="color:#888">Loading...</em>';
  const docs = await (await fetch('/documents')).json();
  if (!docs.length) { el.innerHTML = '<em style="color:#888">No documents yet.</em>'; return; }
  el.innerHTML = docs.map(d => `
    <div class="doc-item">
      <div>
        <div class="doc-title">${d.title}</div>
        <div class="doc-meta">
          ${d.author ? `<span class="badge">${d.author}</span>` : ''}
          ${d.doc_type ? `<span class="badge">${d.doc_type}</span>` : ''}
          <span class="badge">${d.chunk_count} chunk${d.chunk_count !== 1 ? 's' : ''}</span>
          <span class="badge">${d.content_type}</span>
          ${new Date(d.created_at).toLocaleDateString()}
        </div>
        ${Object.keys(d.extra_metadata).length ? `<div class="doc-meta" style="margin-top:4px">${JSON.stringify(d.extra_metadata)}</div>` : ''}
      </div>
      <button class="danger" onclick="deleteDoc('${d.id}', '${d.title.replace(/'/g,"\\'")}')">Delete</button>
    </div>`).join('');
}

async function deleteDoc(id, title) {
  if (!confirm(`Delete "${title}" and all its chunks?`)) return;
  await fetch(`/documents/${id}`, { method: 'DELETE' });
  loadDocuments();
}

// ── Search ──
async function doSearch() {
  const q = document.getElementById('search-q').value;
  if (!q) return;
  const params = new URLSearchParams({ q });
  const dt = document.getElementById('search-doctype').value;
  const au = document.getElementById('search-author').value;
  if (dt) params.append('doc_type', dt);
  if (au) params.append('author', au);

  const data = await (await fetch('/search?' + params)).json();
  const el = document.getElementById('search-results');
  if (!data.results.length) { el.innerHTML = '<div class="card"><em>No results.</em></div>'; return; }
  el.innerHTML = '<div class="card">' + data.results.map(r => `
    <div class="result-item">
      <div><strong>${r.document_title}</strong> — chunk ${r.chunk_index}
        <span class="result-score">score: ${r.score.toFixed(4)}</span>
      </div>
      <div class="result-text">${r.text}</div>
    </div>`).join('') + '</div>';
}

// ── Chat ──
async function sendChat() {
  const q = document.getElementById('chat-input').value.trim();
  if (!q) return;
  document.getElementById('chat-input').value = '';

  const box = document.getElementById('chat-box');
  box.innerHTML += `<div class="bubble user">${q}</div>`;
  box.scrollTop = box.scrollHeight;

  const body = {
    question: q,
    doc_type: document.getElementById('chat-doctype').value || null,
    author: document.getElementById('chat-author').value || null,
    stream: false,
  };

  try {
    const r = await fetch('/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (r.ok) {
      const sourcesHtml = d.sources.length ? `
        <div class="sources-block">
          <details><summary>Sources (${d.sources.length})</summary>
            ${d.sources.map(s => `<div style="margin-top:6px"><strong>${s.document_title}</strong>, chunk ${s.chunk_index}<br><span style="color:#777">${s.text.slice(0,120)}…</span></div>`).join('')}
          </details>
        </div>` : '';
      box.innerHTML += `<div class="bubble assistant">${d.answer.replace(/\n/g,'<br>')}${sourcesHtml}</div>`;
    } else {
      box.innerHTML += `<div class="bubble assistant" style="color:#c0392b">${d.detail || 'Error'}</div>`;
    }
  } catch(e) {
    box.innerHTML += `<div class="bubble assistant" style="color:#c0392b">${e.message}</div>`;
  }
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
